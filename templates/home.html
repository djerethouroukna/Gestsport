<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .hero-section {
            padding: 100px 0;
            color: white;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
        }
        .status-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-running"></i> GestSport
            </a>
            <span class="badge bg-success status-badge">En ligne</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section text-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h1 class="display-3 mb-4">
                        <i class="fas fa-trophy"></i> GestSport
                    </h1>
                    <p class="lead mb-5">{{ message }}</p>
                    
                    <!-- Status Cards -->
                    <div class="row g-4 mb-5">
                        <div class="col-md-3">
                            <div class="card feature-card text-white">
                                <div class="card-body text-center">
                                    <i class="fas fa-users fa-2x mb-3"></i>
                                    <h6>Utilisateurs</h6>
                                    <div class="h4" id="users-count">-</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card feature-card text-white">
                                <div class="card-body text-center">
                                    <i class="fas fa-map-marked-alt fa-2x mb-3"></i>
                                    <h6>Terrains</h6>
                                    <div class="h4" id="terrains-count">-</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card feature-card text-white">
                                <div class="card-body text-center">
                                    <i class="fas fa-calendar-alt fa-2x mb-3"></i>
                                    <h6>Activités</h6>
                                    <div class="h4" id="activities-count">-</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card feature-card text-white">
                                <div class="card-body text-center">
                                    <i class="fas fa-database fa-2x mb-3"></i>
                                    <h6>Base de données</h6>
                                    <div class="h4 text-success">
                                        <i class="fas fa-check-circle"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="row g-3">
                        <div class="col-md-4">
                            <a href="/admin/" class="btn btn-light btn-lg w-100">
                                <i class="fas fa-cog"></i> Administration
                            </a>
                        </div>
                        <div class="col-md-4">
                            <button onclick="checkHealth()" class="btn btn-success btn-lg w-100">
                                <i class="fas fa-heartbeat"></i> Health Check
                            </button>
                        </div>
                        <div class="col-md-4">
                            <button onclick="loadStats()" class="btn btn-info btn-lg w-100">
                                <i class="fas fa-chart-bar"></i> Statistiques
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- API Endpoints Section -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-code"></i> Points de terminaison API</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="d-flex justify-content-between align-items-center p-2 border rounded">
                                        <span><i class="fas fa-users"></i> Users API</span>
                                        <a href="/api/users/" class="btn btn-sm btn-outline-primary" target="_blank">
                                            <i class="fas fa-external-link-alt"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="d-flex justify-content-between align-items-center p-2 border rounded">
                                        <span><i class="fas fa-map-marked-alt"></i> Terrains API</span>
                                        <a href="/api/terrains/" class="btn btn-sm btn-outline-primary" target="_blank">
                                            <i class="fas fa-external-link-alt"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="d-flex justify-content-between align-items-center p-2 border rounded">
                                        <span><i class="fas fa-calendar-alt"></i> Activities API</span>
                                        <a href="/api/activities/" class="btn btn-sm btn-outline-primary" target="_blank">
                                            <i class="fas fa-external-link-alt"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="d-flex justify-content-between align-items-center p-2 border rounded">
                                        <span><i class="fas fa-calendar-check"></i> Reservations API</span>
                                        <a href="/api/reservations/" class="btn btn-sm btn-outline-primary" target="_blank">
                                            <i class="fas fa-external-link-alt"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">
                <i class="fas fa-code"></i> GestSport - Déployé avec succès
            </p>
            <small class="text-muted">
                Dernière mise à jour: <span id="timestamp">{{ timestamp|date:"d/m/Y H:i" }}</span>
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Charger les statistiques au chargement
        window.onload = function() {
            loadStats();
            checkHealth();
        };

        // Fonction pour charger les statistiques
        function loadStats() {
            fetch('/api/status/')
                .then(response => response.json())
                .then(data => {
                    if (data.data) {
                        document.getElementById('users-count').textContent = data.data.users || '0';
                        document.getElementById('terrains-count').textContent = data.data.terrains || '0';
                        document.getElementById('activities-count').textContent = data.data.activities || '0';
                    }
                })
                .catch(error => {
                    console.error('Erreur stats:', error);
                    document.getElementById('users-count').textContent = '?';
                    document.getElementById('terrains-count').textContent = '?';
                    document.getElementById('activities-count').textContent = '?';
                });
        }

        // Fonction pour vérifier le health check
        function checkHealth() {
            fetch('/health/')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'healthy') {
                        showNotification('Système en bonne santé', 'success');
                    } else {
                        showNotification('Système dégradé', 'warning');
                    }
                })
                .catch(error => {
                    console.error('Erreur health check:', error);
                    showNotification('Erreur de connexion', 'danger');
                });
        }

        // Fonction pour afficher des notifications
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `alert alert-${type} position-fixed top-0 start-50 translate-middle-x mt-3`;
            notification.style.zIndex = '9999';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Mettre à jour le timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString('fr-FR');
    </script>
</body>
</html>
