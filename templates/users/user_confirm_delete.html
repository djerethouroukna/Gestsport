{% extends 'base.html' %}
{% load static %}

{% block title %}Supprimer utilisateur - GestSport{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <a href="{% url 'users:user_list' %}" class="btn btn-outline-secondary btn-sm mb-3">
                <i class="fas fa-arrow-left me-1"></i>Retour
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Supprimer l'utilisateur : <em>{{ object.get_full_name }}</em></h5>
                    <p class="text-muted">Cette action est irréversible. Voulez-vous continuer ?</p>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                        <a href="{% url 'users:user_detail' object.id %}" class="btn btn-outline-secondary ms-2">Annuler</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
